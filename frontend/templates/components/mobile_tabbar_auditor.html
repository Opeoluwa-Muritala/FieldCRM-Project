{# Mobile bottom tab bar — Auditor #}
{# Tabs: Home · Flags · Audit · Loans · Logout #}

{% set active_tab = active_tab|default('home') %}

{% macro tab_icon(id) %}
<svg class="tab-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <use class="icon-stroke" href="/static/img/icons.svg#icon-{{ id }}-o"/>
  <use class="icon-fill"   href="/static/img/icons.svg#icon-{{ id }}-f"/>
</svg>
{% endmacro %}

<button class="tab-item {% if active_tab == 'home' %}active{% endif %}"
        type="button" onclick="window.location.href='/dashboard'" aria-label="Home">
    <span class="tab-icon">{{ tab_icon('home') }}</span>
    <span class="tab-label">Home</span>
</button>

<button class="tab-item {% if active_tab == 'flags' %}active{% endif %}"
        type="button" onclick="window.location.href='/compliance-flags'" aria-label="Compliance Flags">
    <span class="tab-icon">{{ tab_icon('flags') }}</span>
    <span class="tab-label">Flags</span>
</button>

<button class="tab-item {% if active_tab == 'audit' %}active{% endif %}"
        type="button" onclick="window.location.href='/audit-trail'" aria-label="Audit Trail">
    <span class="tab-icon">{{ tab_icon('audit') }}</span>
    <span class="tab-label">Audit</span>
</button>

<button class="tab-item {% if active_tab == 'loans' %}active{% endif %}"
        type="button" onclick="window.location.href='/borrowers'" aria-label="Loans">
    <span class="tab-icon">{{ tab_icon('loans') }}</span>
    <span class="tab-label">Loans</span>
</button>

<button class="tab-item"
        type="button" onclick="window.location.href='/logout'" aria-label="Logout">
    <span class="tab-icon">{{ tab_icon('logout') }}</span>
    <span class="tab-label">Logout</span>
</button>
