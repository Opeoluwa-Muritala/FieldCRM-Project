{% set active_tab = active_tab|default('home') %}
<button class="tab-item {% if active_tab == 'home' %}active{% endif %}" type="button" onclick="window.location.href='/dashboard'" aria-label="Home"><span class="tab-icon">&#x1F3E0;</span><span class="tab-label">Home</span></button>
<button class="tab-item {% if active_tab == 'awaiting' %}active{% endif %}" type="button" onclick="window.location.href='/awaiting-me'" aria-label="Awaiting"><span class="tab-icon">&#x2705;</span><span class="tab-label">Awaiting</span></button>
<button class="tab-item {% if active_tab == 'signoffs' %}active{% endif %}" type="button" onclick="window.location.href='/pending-signoffs'" aria-label="Signoffs"><span class="tab-icon">&#x1F4CD;</span><span class="tab-label">Signoffs</span></button>
<button class="tab-item {% if active_tab == 'pipeline' %}active{% endif %}" type="button" onclick="window.location.href='/pipeline'" aria-label="Pipeline"><span class="tab-icon">&#x1F4CA;</span><span class="tab-label">Pipeline</span></button>
<button class="tab-item" type="button" onclick="window.location.href='/logout'" aria-label="Logout"><span class="tab-icon">&#x21AA;</span><span class="tab-label">Logout</span></button>
