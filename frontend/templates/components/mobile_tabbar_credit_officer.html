{% set active_tab = active_tab|default('home') %}

<button class="tab-item {% if active_tab == 'exceptions' %}active{% endif %}" type="button" onclick="window.location.href='/ocr-exceptions'" aria-label="Exceptions"><span class="tab-icon">&#x1F50D;</span><span class="tab-label">OCR</span></button>
<button class="tab-item" type="button" onclick="window.location.href='/borrowers'" aria-label="Loans"><span class="tab-icon">&#x1F4C1;</span><span class="tab-label">Loans</span></button>
