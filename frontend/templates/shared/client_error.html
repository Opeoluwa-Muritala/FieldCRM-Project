<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Status | FieldCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/login.css">
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .error-card {
            background: #fff;
            max-width: 480px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 40px 32px;
            text-align: center;
            border-top: 4px solid var(--accent-danger, #ef4444);
        }
        .error-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .error-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            color: #111827;
            margin-bottom: 12px;
        }
        .error-text {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .brand-logo-wrapper {
            margin-bottom: 32px;
        }
        .brand-logo-img {
            max-height: 48px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="brand-logo-wrapper">
            <a href="/dashboard" class="brand-home-link" aria-label="Go to dashboard"><img class="brand-logo-img" src="{{ brand_logo_black }}" alt="Mainstreet Microfinance Bank Logo"></a>
        </div>
        <div class="error-icon">⚠️</div>
        <h1 class="error-title">Link Inactive or Invalid</h1>
        <p class="error-text">{{ error_message }}</p>
        <div style="font-size: 12px; color: #9ca3af;">
            Mainstreet Microfinance Bank Limited &copy; 2026
        </div>
    </div>
</body>
</html>
