<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found | FieldCRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { color: #251230; background: #f7f5f8; font-family: Montserrat, Arial, sans-serif; }
        body { align-items: center; background: radial-gradient(circle at top, #f0e7f5, #f7f5f8 56%); box-sizing: border-box; display: flex; justify-content: center; margin: 0; min-height: 100vh; padding: 24px; }
        main { background: #fff; border: 1px solid #e6ddeb; border-radius: 18px; box-shadow: 0 18px 44px rgba(46, 0, 82, .12); max-width: 540px; padding: 48px 36px; text-align: center; width: 100%; }
        img { height: auto; margin-bottom: 32px; max-height: 48px; max-width: 220px; }
        .code { color: #89268b; font-size: 72px; font-weight: 700; letter-spacing: -4px; line-height: 1; margin: 0; }
        h1 { font-size: 26px; margin: 16px 0 12px; }
        p { color: #675b6d; line-height: 1.6; margin: 0 auto 28px; max-width: 390px; }
        a { background: #4b075c; border-radius: 8px; color: #fff; display: inline-block; font-weight: 700; padding: 13px 20px; text-decoration: none; }
        a:hover, a:focus { background: #701082; outline: 3px solid #d8b7df; outline-offset: 3px; }
    </style>
</head>
<body>
    <main>
        <img src="/static/img/MMFB%20Logo%20Black.png" alt="Mainstreet Microfinance Bank">
        <p class="code" aria-label="Error 404">404</p>
        <h1>Page not found</h1>
        <p>{{ message or 'The page you requested could not be found.' }}</p>
        <a href="/dashboard">Return to dashboard</a>
    </main>
</body>
</html>
