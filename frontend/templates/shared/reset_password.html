<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Complete Registration' if invitation else 'Reset Password' }} | FieldCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-split-container">
        <div class="brand-panel">
            <header class="brand-header">
                <div class="brand-logo-wrapper">
                    <a href="/dashboard" class="brand-home-link" aria-label="Go to dashboard"><img class="brand-logo-img" src="/static/img/MMFB%20logo%20White.png" alt="Mainstreet Microfinance Bank" loading="lazy"></a>
                </div>
            </header>
        </div>

        <div class="form-panel registration-panel">
            <div class="form-shell registration-form-shell">
                <div class="login-title-area registration-header">
                    <h1 class="login-title">{{ 'Complete Registration' if invitation else 'Reset Password' }}</h1>
                    <p class="login-subtitle">{{ 'Set a password to activate your FieldCRM account.' if invitation else 'Enter your new password below.' }}</p>
                </div>

                {% if error %}
                <div style="background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; padding:12px; color:#991b1b; font-size:13px; margin-bottom:16px;">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/reset-password">
                    <input type="hidden" name="token" value="{{ token or '' }}">
                    <input type="hidden" name="invitation" value="{{ 'true' if invitation else 'false' }}">
                    <div class="form-group">
                        <label class="form-label" for="new_password">New Password</label>
                        <div class="input-container">
                            <input class="form-input" id="new_password" name="new_password" type="password" placeholder="New password" autocomplete="new-password" required minlength="8">
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:12px;">
                        <label class="form-label" for="confirm_password">Confirm Password</label>
                        <div class="input-container">
                            <input class="form-input" id="confirm_password" name="confirm_password" type="password" placeholder="Confirm new password" autocomplete="new-password" required minlength="8">
                        </div>
                    </div>
                    <button class="login-btn" type="submit" style="margin-top:16px;">
                        <span>{{ 'Activate Account' if invitation else 'Reset Password' }}</span>
                    </button>
                    <div style="text-align:center; margin-top:16px; font-size:13px;">
                        <a href="/login" style="color:var(--color-primary, #7c3aed); text-decoration:none;">&larr; Back to Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
